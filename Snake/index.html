<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="wrapper">

  <div class="game-details">
    <span class="score">Score : 0</span>
    <span class="high-score">Meilleur : 0</span>
  </div>

  <div class="play-board"></div>

  <div class="game-over">
    <p class="over-label">Partie terminée</p>
    <p id="final-score"></p>
    <button id="restart">Rejouer</button>
  </div>

  <div class="controls">
    <button class="ctrl-btn" data-key="ArrowLeft">&#8592;</button>
    <button class="ctrl-btn" data-key="ArrowUp">&#8593;</button>
    <button class="ctrl-btn" data-key="ArrowDown">&#8595;</button>
    <button class="ctrl-btn" data-key="ArrowRight">&#8594;</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
